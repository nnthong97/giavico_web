name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: 
          npm ci

      - name: Lint
        run: npm run ci:lint

      - name: Build
        run: npm run ci:build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: giavico-web-dist
          path: dist/apps
          if-no-files-found: error
          retention-days: 7
